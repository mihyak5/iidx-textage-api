name: Auto Fetch Textage Data

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # 【改动1】：把 Python 换成 Node.js 环境
      - name: 配置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 【改动2】：安装我们在 js 代码里用到的两个请求和解码工具
      - name: 安装依赖
        run: |
          npm install axios iconv-lite

      # 【改动3】：运行我们的 JS 脚本
      - name: 运行 Node.js 爬虫脚本
        run: |
          node fetch_data.js

      - name: 提交并推送到仓库
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          
          # 【关键修改】：用 *.json 把所有生成的 JSON 文件一网打尽
          git add *.json || true
          
          git commit -m "Auto update all textage tables via Node.js" || echo "No changes to commit"
          git push
